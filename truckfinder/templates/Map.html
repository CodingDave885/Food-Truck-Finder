{%extends "layout.html"%}
{%block content%}
<!--
This is the menu panel that is used for the menu
It is invisible at first, and then become visible when
you ask for it when you are on the food truck
-->
<!--
The menu panel makes a container for the side panel
-->
<div id="menu-panel">
    <!--
    The close menu button is an x for the user to press
    -->
  <button id="close-menu">✕</button>
    <!--
    This makes an empty div to later put the HTML in later
    -->
  <div id="menu-content"></div>
</div>

<div id="routing-instructions">Select a truck to start navigating...</div>
<div id="map"></div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>
    <script>

      let routingControl = null;
      let trackedTruckId = null;

      // This is the icon if the truck is open
      const openIcon = L.icon({
      iconUrl: '/static/images/unsaturated.png',   
      iconSize: [40, 40],                        
      iconAnchor: [20, 40],                   
      popupAnchor: [0, -40],                      
  });

      // This is the icon if the truck is closed
      // It is the gray version of the opened one
      const closedIcon = L.icon({
      iconUrl: '/static/images/saturated.png',
      iconSize: [40, 40],
      iconAnchor: [20, 40],
      popupAnchor: [0, -40],
      });

        // Go look through the HTML and give me the element whose id is equal to menu panel
        const menuPanel = document.getElementById("menu-panel");
        // Does this with all of it, and then stores it in these variables
        const menuContent = document.getElementById("menu-content");
        const closeBtn = document.getElementById("close-menu");

        // This adds the open class to the panel
        function openMenuPanel() {
          menuPanel.classList.add("open");
        }

        // Removes the open class, goes back to default
        function closeMenuPanel() {
          menuPanel.classList.remove("open");
        }

        // When the user clicks the x, the panel closes
        closeBtn.addEventListener("click", closeMenuPanel);

        function showMenu(truckId) {
          //Calls the open panel function
          openMenuPanel();
          // This is only temporary text while it is fetching the data
          menuContent.innerHTML = "<p>Loading...</p>";
          // Sends a request to the route number
          fetch(`/api/trucks/${truckId}/menu`)
            // Converts teh JSON into JS objects
            .then(res => res.json())
            //Passes menu items to renderer
            .then(data => renderMenu(data));
        }
        function renderMenu(items) {
          // If we didn't import the menu yet, it will say it isn't available
          // This is better than having blank text
          if (items.length === 0) {
            menuContent.innerHTML = "<p>No menu available.</p>";
            return;
          }
          // Empty String to build
          let html = "";
          // Loops over each menu item
          items.forEach(item => {
            // Builds HTML using menu data
            html += `
              <div class="menu-item">
                <h4>${item.name} — $${item.price}</h4>
              </div>
            `;
          });
          // Injects HTML into the panel
          menuContent.innerHTML = html;
}
        var map = L.map('map', {
          zoomControl: false,
          attributionControl: false,
          zoomAnimation: true,
          fadeAnimation: true,
        }).setView([39.9566, -75.1899], 16.5);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            maxZoom: 19,
        }).addTo(map);

        map.locate({
        watch: true, 
        enableHighAccuracy: true,
        });

        // This is going to be used as a simple lookup table
        // It is in this order bc 0 = Monday and 6 = Saturday
        const days = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];

        // This function basically gets around Monday being 0 and Saturday being the last day
        // It allows the hours to be listed from Sunday to Saturday now
        // datetime.weekday() returns 0 as Monday, JS returns Monday as 1
        // So this converts it when you use it in JS
        function jsDayFromPython(pythonDay) {
            return (pythonDay + 1) % 7;
        }

        //hours is an array of the days of the week and the open / closing times
        function buildHoursList(hours) {
            // This gets today's day according to JS
            const today = new Date().getDay(); // JS: Sun=0

            // Sorts it so today appears first
            // Creates a copy of hours so we don't mutate the original
            // a and b are being compared
            // It returns a negative number if a comes before b
            // It returns a positive number if a comes after b
            const sorted = [...hours].sort((a, b) => {
                // If a is today, return -1 and move a up
                // Otherwise return 1 and move a down
                // This allows today to be the top day
                return jsDayFromPython(a.day_of_week) === today ? -1 : 1;
            });
          // Sorted is an array of the days sorted from today onward
          return sorted
                .map(h => {
                    // Converts teh python weekday into JS weekday
                    const jsDay = jsDayFromPython(h.day_of_week);
                    // This just returns if today is the day that it says it is
                    // Marks the day to bold in the return statement
                    const isToday = jsDay === today;

                    return `
                        <!-- Bolds Today -->
                        <li ${isToday ? 'style="font-weight: bold;"' : ""}>
                        ${isToday ? "" : ""}
                        ${days[jsDay]}:
                        ${h.open_time} – ${h.close_time}
                        </li>
                    `;
                })
                .join("");
            }
        // Fetch trucks from backend
        fetch('/api/food_trucks')
            // Fetch returns something called a promise
            // This basically converts the raw HTTP response into usable JS data
            .then(response => response.json())
            // This then returns actual data
            .then(data => {
                // This loops through every truck
                data.forEach(truck => {

                    // This sets the icon to either opened or closed
                    const customIcon = truck.is_open ? openIcon : closedIcon;

                    // Creates the leaflet marker
                    L.marker([truck.latitude, truck.longitude], {icon: customIcon })
                        // This actually adds it to the map
                        .addTo(map)
                        // Creates the popup of the marker
                        .bindPopup(`
                            <h3>${truck.name}</h3>

                            <p>
                                <strong>Status:</strong>
                                <!--If it is opened, do the first option
                                If it is closed, do the second option-->
                                ${truck.is_open ? " 🟢 Open now" : "🔴 Closed"}
                            </p>

                            <p><strong>Hours:</strong></p>
                            <ul>
                                ${buildHoursList(truck.hours)}
                            </ul>
                            <br>
                            <!--
                            Calls showMenu(), and passes the truck's db
                            -->
                            <button onclick="showMenu(${truck.id})">
                                MENU
                            </button>
                            <button onclick="startTracking(${truck.id}, ${truck.latitude}, ${truck.longitude})">
                            TRACK
                            </button>
                        `);
                });
            });

    const instructionBox = document.getElementById('routing-instructions');

function startTracking(truckId, truckLat, truckLng) {
    if (!userMarker) {
        alert("Wait a second, still finding your location...");
        return;
    }
    if (trackedTruckId === truckId) {
    if (routingControl) {
        map.removeControl(routingControl);
        routingControl = null;
        trackedTruckId = null;
        instructionBox.style.display = 'none';
    }
    return;
}

    if (routingControl) {
        map.removeControl(routingControl);
    }

    routingControl = L.Routing.control({
      waypoints: [
          userMarker.getLatLng(), 
          L.latLng(truckLat, truckLng)
      ],
      router: L.Routing.osrmv1({
        serviceUrl: 'https://router.project-osrm.org/route/v1',
        profile: 'foot'
    }),
      lineOptions: {
          styles: [{ color: '#8cbaee', weight: 6, opacity: 0.8 }]
      },  
      addWaypoints: false,
      draggableWaypoints: false,
  
      show: false, 
      itinerary: false, 
    
    createMarker: function() { return null; } 
}).addTo(map);
    routingControl.on('routesfound', function(e) {
        const routes = e.routes;
        const summary = routes[0].summary; 
        const instructions = routes[0].instructions;
        
        if (instructions && instructions.length > 0) {
            instructionBox.style.display = 'block';
          
            const metersToMiles = 0.000621371;
            const totalMiles = (summary.totalDistance * metersToMiles).toFixed(2);
          
            const nextStep = instructions[0];
            const nextStepMiles = (nextStep.distance * metersToMiles).toFixed(2);
        
            const walkTimeMinutes = Math.round(summary.totalTime / 5);

instructionBox.innerHTML = `
    <small style="color: #888; display: block;">${walkTimeMinutes} min walk</small>
    <strong>${nextStep.text}</strong> 
    <span style="color: #fff; margin-left: 10px;">${totalMiles} mi left</span>
`;
        }
    });
}
        function onMapClick(e) {
            L.popup()
                .setLatLng(e.latlng)
                .setContent("Coordinates: " + e.latlng.toString())
                .openOn(map);
        }

        map.on('click', onMapClick);

        function onLocationFound(e) {
          const radius = e.accuracy / 2;

          L.marker(e.latlng).addTo(map)
            .bindPopup("You are here").openPopup();

          L.circle(e.latlng, radius).addTo(map);
        }

        let userMarker, accuracyCircle;

map.on('locationfound', (e) => {
    const radius = e.accuracy / 2;
    if (!userMarker) {
        userMarker = L.marker(e.latlng).addTo(map);
        accuracyCircle = L.circle(e.latlng, radius).addTo(map);
    } else {
        userMarker.setLatLng(e.latlng);
        accuracyCircle.setLatLng(e.latlng);
        accuracyCircle.setRadius(radius);
        if (routingControl) {
            const currentWaypoints = routingControl.getWaypoints();
            routingControl.setWaypoints([
                e.latlng, 
                currentWaypoints[1].latLng
            ]);
        }
    }
    if (routingControl && trackedTruckId !== null) {
        const currentWaypoints = routingControl.getWaypoints();
        const oldPos = currentWaypoints[0].latLng;
        if (oldPos.distanceTo(e.latlng) > 5) {
            routingControl.setWaypoints([
                e.latlng, 
                currentWaypoints[1].latLng
            ]);
        }
    }
});

        function onLocationError(e) {
        alert(e.message);
        }

        map.on('locationerror', onLocationError);

    </script>
{%endblock%}

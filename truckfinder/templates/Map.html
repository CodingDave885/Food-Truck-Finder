{%extends "layout.html"%}
{%block content%}

<!-- Author: David Liberatore 4/8/2026 -->

<!--
This is the sidebar header row that holds the toggle button
and the tab buttons side by side
-->
<div id="sidebar-header">
    <!--
    The toggle button opens and closes the sidebar panel
    -->
    <button id="togglePanel">☰ Trucks</button>
    <!--
    The tab buttons let the user switch between viewing
    all trucks or only their favorited trucks
    -->
    <div class="sidebar-tabs">
        <button class="tab-btn active" onclick="switchTab('all', this)">All Trucks</button>
        <button class="tab-btn" onclick="switchTab('favorites', this)">Favorites</button>
    </div>
</div>

<!-- Sidebar -->
<div id="sidePanel">
    <!--
    This is an empty container that gets truck buttons
    injected into it dynamically by sidebar.js
    -->
    <div id="truckList"></div>
</div>

<!--
This is the menu panel that is used for the menu
It is invisible at first, and then become visible when
you ask for it when you are on the food truck
-->
<!--
The menu panel makes a container for the side panel
-->
<div id="menu-panel">
    <!--
    The close menu button is an x for the user to press
    -->
  <button id="close-menu">✕</button>
    <!--
    This makes an empty div to later put the HTML in later
    -->
  <div id="menu-content"></div>
</div>
<div id="stop-button-menu" class="overlay">
    <button id="stop-button">Stop Tracking</button>
</div>
<div id="light-mode-box">
    <button id="mode-swap">
        <i class="fas fa-sun"></i>
    </button>
</div>

<div id="routing-instructions">Select a truck to start navigating...</div> <!--Head div, shows the little pill on the bottom routing-instructions is the class name-->
<div id="map"></div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script> <!-- Import leaflet -->
    <script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script> <!-- Import open source routing -->
    <!-- Refactored Code into single JS files for better & cleaner code execution -->
    <script src="{{ url_for('static', filename='js/map.js') }}"></script>\
    <script src="{{ url_for('static', filename='js/functions/sidebar.js') }}"></script>
    <script src="{{ url_for('static', filename='js/routing.js') }}"></script>
    <script src="{{ url_for('static', filename='js/functions/menu.js') }}"></script>
    <script src="{{ url_for('static', filename='js/functions/calculator.js') }}"></script>
    <script src="{{ url_for('static', filename='js/functions/location.js') }}"></script>    
    <script src="{{ url_for('static', filename='js/functions/favorite.js') }}"></script>

{%endblock%}

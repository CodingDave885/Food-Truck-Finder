{% extends 'layout.html' %}
{% block content%}

<form method="POST">

    {{ form.hidden_tag() }}

    {{ form.username.label }}
    {{ form.username() }}
    <br><br>
    {{ form.password.label }}
    {{ form.password() }}
    <br>
    {{ form.submit(class="my_btn") }}
</form>
{% endblock %}
